<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>waska</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>">
</head>
<body>


    <div id="desktop-environment" class="desktop-environment" style="display: none;">
        <div class="desktop-icon" id="waska-app">
            <div class="icon-container">
                <div class="icon-glass">
                    <i class="fas fa-terminal main-icon"></i>
                    <div class="icon-shine"></div>
                </div>
                <div class="icon-base-glow"></div>
            </div>
            <div class="icon-label-container">
                <span class="icon-label">waska.exe</span>
                <div class="label-underline"></div>
            </div>
        </div>
    </div>

    <div class="snow-container">
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
    </div>
    
    <div class="fog"></div>
    
    <div class="container">
        <div class="status-widget">
            <div class="discord-section">
                <div class="widget-header">
                    <i class="fab fa-discord"></i>
                    <span>Discord Status</span>
                </div>
                <div class="discord-profile">
                    <div class="avatar-container">
                        <img id="discord-avatar" src="" alt="Discord Avatar" class="discord-avatar">
                        <div class="status-indicator" id="discord-status"></div>
                    </div>
                    <div class="discord-info">
                        <span class="discord-username" id="discord-username">@wwwwwwwwaska</span>
                    </div>
                </div>
            </div>
            
            <div class="widget-divider"></div>
            
            <div class="spotify-section">
                <div class="widget-header">
                    <i class="fab fa-spotify"></i>
                    <span>Now Playing</span>
                </div>
                <div class="spotify-content" id="spotify-content">
                    <div class="track-info">
                        <span class="track-name" id="spotify-track">Not playing</span>
                        <span class="artist-name" id="spotify-artist">-</span>
                    </div>
                    <div class="album-art">
                        <img id="spotify-album" src="" alt="Album Art">
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="spotify-progress-fill"></div>
                    </div>
                    <div class="time-info">
                        <span id="spotify-current-time">0:00</span>
                        <span id="spotify-duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="profile">
                <div class="profile-img-container">
                    <img id="main-avatar" src="" alt="c" class="profile-img">
                    <div class="frost-overlay"></div>
                </div>
                <h1 class="username">
                    <span class="name-text">waska</span>
                </h1>
                <p class="bio">
                    <span class="typing-text">made by @wwwwwwwwaska</span>
                    <span class="cursor-blink">_</span>
                </p>
            </div>
            
            <div class="social-links">
                <a href="#" class="social-link discord-link" id="discord-social-link" data-tooltip="Discord">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                    <div class="frost-effect"></div>
                </a>
                
                <a href="https://steamcommunity.com/id/w6ska/" class="social-link steam-link" data-tooltip="Steam" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-steam"></i>
                    <span>Steam</span>
                    <div class="frost-effect"></div>
                </a>
                
                <a href="https://www.tiktok.com/@user6282934719374" class="social-link tiktok-link" data-tooltip="TikTok" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                    <div class="frost-effect"></div>
                </a>
            </div>
            
            <div class="footer">
                <p>© 2026 - made by waska</p>
                <div class="last-seen">
                    <i class="fas fa-clock"></i>
                    <span id="last-seen">Last seen: calculating...</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="cursor"></div>

    <audio id="bg-music" src="audio.mp3" loop></audio>

    <div class="audio-player" id="audio-player">
        <div class="player-track-info">
            <i class="fas fa-compact-disc disc-spin"></i>
            <span class="player-track-name">Cxupsean - Trapnearly</span>
        </div>
        <div class="player-controls-row">
            <button class="player-btn" id="play-pause-btn">
                <i class="fas fa-pause"></i>
            </button>
            <div class="player-progress-container">
                <span class="player-time" id="player-current-time">0:00</span>
                <div class="player-progress-bar">
                    <div class="player-progress-fill" id="player-progress-fill"></div>
                </div>
                <span class="player-time" id="player-duration">0:00</span>
            </div>
            <div class="volume-container">
                <i class="fas fa-volume-up" id="vol-icon"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
